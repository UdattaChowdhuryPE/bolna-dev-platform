# Fly.io configuration for Bolna Dev Platform
app = "bolna-dev-platform"
primary_region = "sjc"

[build]
  builder = "paketobuildpacks"

[build.buildpacks]
  id = "gcr.io/paketo-buildpacks/nodejs"

[env]
  NODE_ENV = "production"
  NODE_OPTIONS = "-—max_old_space_size=1024"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

  [[services.tcp_checks]]
    grace_period = "5s"
    interval = "15s"
    timeout = "2s"
